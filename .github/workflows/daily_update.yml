# ─────────────────────────────────────────────────────────────────
# Sino Intelligence — Daily Automated Update
# Runs every day at 6:00 AM EDT (10:00 UTC).
# You can also trigger it manually from GitHub's Actions tab.
# ─────────────────────────────────────────────────────────────────

name: Daily Intelligence Update

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 6:00 AM EDT every day
  workflow_dispatch:        # allows manual run from GitHub UI

permissions:
  contents: write           # needed to commit the updated articles.json

jobs:
  update:
    name: Fetch & Summarize
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Run the pipeline
      #    ANTHROPIC_API_KEY is stored as a GitHub Secret (see setup guide below)
      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_pipeline.py

      # 5. Commit the new articles.json back to the repo
      #    Vercel will auto-redeploy when it detects this commit
      - name: Commit updated data
        run: |
          git config --global user.name  "sino-intel-bot"
          git config --global user.email "bot@sino-intel.example"
          git add public/data/articles.json
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
