# ─────────────────────────────────────────────────────────────────
# Sino Intelligence — Daily Automated Update
# Runs every day at 6:00 AM EDT (10:00 UTC).
# You can also trigger it manually from GitHub's Actions tab.
# ─────────────────────────────────────────────────────────────────

name: Daily Intelligence Update

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    name: Fetch & Summarize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_pipeline.py

      - name: Commit updated data
        run: |
          git config --global user.name  "sino-intel-bot"
          git config --global user.email "bot@sino-intel.example"
          git add public/data/articles.json
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
